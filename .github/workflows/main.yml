name: Java CI/CD avec Maven et AWS

on:
  push:
    branches: [ "main" ] 
  pull_request:
    branches: [ "main" ]

jobs:
  # ----------------------------------------------------
  # 1. JOB DE COMPILATION ET TESTS
  # ----------------------------------------------------
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Récupérer le code source
      uses: actions/checkout@v4

    - name: Configurer Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'

    - name: Compiler et packager avec Maven
      working-directory: World_cup_B3
      run: mvn clean package -DskipTests 

    - name: Sauvegarder l'artefact (le fichier war/jar)
      uses: actions/upload-artifact@v4
      with:
        name: application-artifact
        path: World_cup_B3/target/*.war 

  # ----------------------------------------------------
  # 2. JOB DE DÉPLOIEMENT SUR AWS EC2 (CD)
  # ----------------------------------------------------
  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' 

    steps:
    - name: Télécharger l'artefact généré au job précédent
      uses: actions/download-artifact@v4
      with:
        name: application-artifact
        path: target-delivery 

    - name: Déployer le fichier sur AWS EC2 via SSH
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.AWS_EC2_HOST }}
        username: ${{ secrets.AWS_EC2_USER }}
        key: ${{ secrets.AWS_SSH_KEY }}
        source: "target-delivery/*.war"
        target: "/home/${{ secrets.AWS_EC2_USER }}/app"
        strip_components: 1

    - name: Redémarrer l'application sur le serveur
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.AWS_EC2_HOST }}
        username: ${{ secrets.AWS_EC2_USER }}
        key: ${{ secrets.AWS_SSH_KEY }}
        script: |
          # 1. Installation des prérequis si manquants
          sudo dnf update -y
          sudo dnf install -y java-17-amazon-corretto-headless mariadb105-server
          
          # 2. Lancement de MariaDB et configuration de la base
          sudo systemctl start mariadb
          sudo systemctl enable mariadb
          sudo mysql -e "CREATE DATABASE IF NOT EXISTS world_cup_db CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;"
          sudo mysql -e "CREATE USER IF NOT EXISTS 'world_cup_user'@'localhost' IDENTIFIED BY 'root';"
          sudo mysql -e "GRANT ALL PRIVILEGES ON world_cup_db.* TO 'world_cup_user'@'localhost';"
          sudo mysql -e "FLUSH PRIVILEGES;"
          
          # 3. Arrêt de l'ancienne version de l'API (si elle tourne)
          cd /home/${{ secrets.AWS_EC2_USER }}/app
          pid=$(ps aux | grep java | grep -v grep | awk '{print $2}')
          if [ -n "$pid" ]; then
            echo "Arrêt de l'ancienne version Java (PID: $pid)..."
            kill -15 $pid
            sleep 3
            kill -9 $pid 2>/dev/null || true
          fi
          
          # 4. RESOLUTION DU BUG : Trouver le nom exact du fichier présent dans le dossier actuel
          # (L'action scp dépose le fichier directement ici, le préfixe "target-delivery/" n'existe plus sur le serveur)
          FICHIER_WAR=$(ls *.war 2>/dev/null | head -n 1)
          
          if [ -z "$FICHIER_WAR" ]; then
            echo "ERREUR : Aucun fichier .war trouvé dans $(pwd)"
            exit 1
          fi
          
          # 5. Démarrage de l'application avec son nom exact
          echo "Démarrage de la nouvelle version : $FICHIER_WAR"
          nohup java -jar "$FICHIER_WAR" > app.log 2>&1 &
          sleep 2
